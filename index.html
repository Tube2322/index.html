<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ตัวช่วยตรวจอาคารประจำเดือน</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ตรวจอาคาร">
<meta name="theme-color" content="#12161B">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #12161B;
    --panel: #1B2129;
    --panel-2: #222933;
    --line: #2C3540;
    --text: #F1EEE6;
    --text-muted: #8B94A0;
    --amber: #FFC53D;
    --amber-dim: #6b5a24;
    --green: #46C08C;
    --red: #E5484D;
    --radius: 14px;
  }
  :root[data-theme="light"]{
    --bg: #F7F5EF;
    --panel: #FFFFFF;
    --panel-2: #F0ECE1;
    --line: #DED7C7;
    --text: #221F19;
    --text-muted: #6E6656;
    --amber: #B8790A;
    --amber-dim: #E9C77A;
    --green: #1F9D66;
    --red: #C93A3F;
  }
  :root[data-theme="contrast"]{
    --bg: #000000;
    --panel: #111111;
    --panel-2: #1A1A1A;
    --line: #3A3A3A;
    --text: #FFFFFF;
    --text-muted: #BFBFBF;
    --amber: #FFD400;
    --amber-dim: #7A6400;
    --green: #00E676;
    --red: #FF453A;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans Thai', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .mono{ font-family:'JetBrains Mono', monospace; }
  #app{
    max-width: 480px;
    margin: 0 auto;
    padding: 16px 16px 40px;
    min-height: 100vh;
  }
  @media (min-width: 720px){
    #app{ max-width: 820px; padding: 28px 32px 48px; }
    .job-grid{ grid-template-columns: 1fr 1fr; }
  }
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom: 18px; gap: 10px;
  }
  .topbar h1{
    font-size: 17px; font-weight:700; margin:0; letter-spacing:0.2px;
  }
  .iconbtn{
    background: var(--panel-2); border:1px solid var(--line); color: var(--text);
    width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:16px; flex-shrink:0;
  }
  .iconbtn:hover{ border-color: var(--amber); }
  select.month-select{
    background: var(--panel-2); color: var(--text); border:1px solid var(--line);
    border-radius:10px; padding:8px 10px; font-family:'Noto Sans Thai'; font-size:14px;
    flex:1; min-width:0;
  }
  .panel{
    background: var(--panel); border:1px solid var(--line); border-radius: var(--radius);
    padding: 16px; margin-bottom: 14px;
  }
  .overall-panel{
    display:flex; align-items:center; gap:14px;
  }
  .overall-text{ flex:1; }
  .overall-text .big-num{ font-size:26px; font-weight:800; }
  .overall-text .label{ color:var(--text-muted); font-size:13px; margin-top:2px; }
  .job-grid{ display:grid; grid-template-columns: 1fr; gap:10px; }
  .job-card{
    background: var(--panel); border:1px solid var(--line); border-radius: var(--radius);
    padding: 14px; display:flex; align-items:center; gap:12px; cursor:pointer;
    transition: border-color .15s ease;
  }
  .job-card:hover{ border-color: var(--amber); }
  .job-icon{
    width:44px; height:44px; border-radius:10px; background: var(--panel-2);
    display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0;
  }
  .job-info{ flex:1; min-width:0; }
  .job-name{ font-weight:600; font-size:15px; }
  .job-sub{ color:var(--text-muted); font-size:12.5px; margin-top:2px; }
  .status-dot{ width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .dot-gray{ background:#4A5460; }
  .dot-amber{ background: var(--amber); }
  .dot-green{ background: var(--green); }
  .dot-red{ background: var(--red); }
  .chip{
    font-size:11px; padding:3px 8px; border-radius:20px; font-weight:600; white-space:nowrap;
  }
  .chip-ok{ background: rgba(70,192,140,0.15); color: var(--green); }
  .chip-bad{ background: rgba(229,72,77,0.15); color: var(--red); }
  .chip-none{ background: rgba(139,148,160,0.15); color: var(--text-muted); }
  .btn{
    background: var(--amber); color:#1A1400; border:none; border-radius:10px;
    padding:12px 16px; font-family:'Noto Sans Thai'; font-weight:700; font-size:14.5px;
    cursor:pointer; width:100%;
  }
  .btn:active{ transform: scale(0.99); }
  .btn-ghost{
    background: transparent; color: var(--text); border:1px solid var(--line);
    border-radius:10px; padding:11px 16px; font-family:'Noto Sans Thai'; font-weight:600; font-size:14px;
    cursor:pointer;
  }
  .btn-ghost:hover{ border-color: var(--amber); }
  .btn-small{ padding:8px 12px; font-size:13px; width:auto; }
  .btn-row{ display:flex; gap:8px; flex-wrap:wrap; }
  .btn-row .btn-ghost{ flex:1; min-width:140px; }
  .back-row{ display:flex; align-items:center; gap:10px; margin-bottom: 14px; }
  .back-row h2{ font-size:16px; margin:0; font-weight:700; }
  textarea{
    width:100%; background: var(--panel-2); color:var(--text); border:1px solid var(--line);
    border-radius:10px; padding:12px; font-family:'Noto Sans Thai'; font-size:14.5px; line-height:1.5;
    resize:vertical; min-height:90px;
  }
  textarea:focus, input:focus, select:focus{ outline:2px solid var(--amber); outline-offset:1px; }
  .hint{ color:var(--text-muted); font-size:12.5px; margin-top:6px; line-height:1.5; }
  .row-actions{ display:flex; gap:8px; margin-top:10px; }
  .table-scroll{ overflow-x:auto; -webkit-overflow-scrolling:touch; margin:0 -4px; }
  table{ border-collapse: collapse; margin-top:4px; width:100%; min-width:520px; }
  th{ text-align:left; font-size:11px; color:var(--text-muted); font-weight:600; padding:6px 6px; border-bottom:1px solid var(--line); white-space:nowrap; }
  td{ padding:5px 6px; border-bottom:1px solid var(--line); vertical-align:middle; }
  td input, td select{
    background: transparent; border:1px solid transparent; color:var(--text);
    font-family:'Noto Sans Thai'; font-size:13.5px; width:100%; padding:5px 4px; border-radius:6px;
  }
  select option, select.month-select option{
    background-color: var(--panel-2);
    color: var(--text);
  }
  td input:hover, td select:hover{ background: var(--panel-2); }
  .col-floor input{ width:44px; }
  .status-btn{
    border:none; border-radius:8px; padding:5px 9px; font-size:12px; font-weight:700; cursor:pointer;
    font-family:'Noto Sans Thai'; white-space:nowrap;
  }
  .status-btn.ok{ background: rgba(70,192,140,0.18); color: var(--green); }
  .status-btn.bad{ background: rgba(229,72,77,0.18); color: var(--red); }
  .del-btn{
    background:none; border:none; color: var(--text-muted); cursor:pointer; font-size:16px; padding:2px 6px;
  }
  .del-btn:hover{ color: var(--red); }
  .empty-row{ color: var(--text-muted); font-size:13px; padding:14px 4px; text-align:center; }
  .completeness-bar{
    display:flex; align-items:center; gap:12px; margin-top:14px;
  }
  .bar-track{ flex:1; height:8px; background: var(--panel-2); border-radius:4px; overflow:hidden; }
  .bar-fill{ height:100%; border-radius:4px; transition: width .3s ease; }
  pre.summary-text{
    white-space:pre-wrap; background: var(--panel-2); border:1px solid var(--line); border-radius:10px;
    padding:12px; font-family:'JetBrains Mono', monospace; font-size:12.5px; line-height:1.6; margin:10px 0;
  }
  .divider{ height:1px; background: var(--line); margin:16px 0; }
  .config-section-title{ font-size:13px; color:var(--text-muted); font-weight:700; margin: 4px 0 8px; text-transform:none; letter-spacing:0.3px; }
  .config-row{
    display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--line);
    gap:10px;
  }
  .config-row:last-child{ border-bottom:none; }
  .config-row .name{ font-size:14px; font-weight:500; }
  .config-row input{
    width:70px; background: var(--panel-2); border:1px solid var(--line); color:var(--text);
    border-radius:8px; padding:7px 8px; font-family:'JetBrains Mono'; font-size:14px; text-align:center;
  }
  .header-field{ margin-bottom:10px; }
  .header-field label{ display:block; font-size:12.5px; color:var(--text-muted); margin-bottom:4px; }
  .header-field input{
    width:100%; background: var(--panel-2); border:1px solid var(--line); color:var(--text);
    border-radius:8px; padding:9px 10px; font-family:'Noto Sans Thai'; font-size:14px;
  }
  .job-config-block{ margin-bottom:10px; }
  .job-config-head{ display:flex; align-items:center; justify-content:space-between; padding:4px 0 8px; }
  .job-config-head .name{ font-weight:700; font-size:14.5px; }
  .field-chip-row{ display:flex; align-items:center; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--line); font-size:13px; gap:8px; }
  .field-chip-row .ftype{ color: var(--text-muted); font-size:11px; background:var(--panel-2); padding:2px 7px; border-radius:10px; margin-left:6px; }
  .add-field-row{ display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
  .add-field-row input, .add-field-row select{
    background: var(--panel-2); border:1px solid var(--line); color:var(--text); border-radius:8px;
    padding:7px 8px; font-family:'Noto Sans Thai'; font-size:13px;
  }
  .add-field-row input[data-newfield-label]{ flex:2; min-width:110px; }
  .add-field-row select{ flex:1; min-width:90px; }
  .add-field-row input[data-newfield-options]{ flex:2; min-width:110px; }
  .field-form{ display:grid; grid-template-columns: 1fr; gap:10px; margin-top:10px; }
  @media (min-width:560px){ .field-form{ grid-template-columns: 1fr 1fr; } }
  .field-form .fgroup label{ display:block; font-size:12px; color:var(--text-muted); margin-bottom:4px; }
  .field-form .fgroup input, .field-form .fgroup select{
    width:100%; background: var(--panel-2); border:1px solid var(--line); color:var(--text);
    border-radius:8px; padding:9px 10px; font-family:'Noto Sans Thai'; font-size:13.5px;
  }
  .field-form .fgroup .fcaption{ font-size:11.5px; color:var(--text-muted); margin-top:4px; line-height:1.5; }
  .add-field-toggle{
    color: var(--amber); font-weight:700; font-size:13.5px; cursor:pointer; padding:8px 0; list-style:none; user-select:none;
  }
  .add-field-toggle::-webkit-details-marker{ display:none; }
  .add-field-toggle:before{ content:'+ '; }
  details[open] .add-field-toggle:before{ content:'– '; }
  .guide-box{
    background: var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-bottom:12px;
  }
  .guide-box summary{ cursor:pointer; font-weight:700; font-size:13.5px; color:var(--amber); list-style:none; }
  .guide-box summary::-webkit-details-marker{ display:none; }
  .guide-box ol{ margin:10px 0 0; padding-left:18px; font-size:13px; line-height:1.7; color:var(--text); }
  .guide-box .ex{ margin-top:10px; background: var(--panel); border:1px solid var(--line); border-radius:8px; padding:8px 10px; font-size:12.5px; color:var(--text-muted); }
  .guide-box .ex .mono{ color:var(--amber); }
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background: var(--panel-2); border:1px solid var(--amber); color:var(--text);
    padding:10px 18px; border-radius:20px; font-size:13.5px; z-index:100;
    animation: toastin .2s ease; max-width:90%; text-align:center;
  }
  @keyframes toastin{ from{ opacity:0; transform:translate(-50%,8px);} to{opacity:1; transform:translate(-50%,0);} }
  .issue-item{ font-size:13px; padding:8px 0; border-bottom:1px solid var(--line); }
  .issue-item:last-child{ border-bottom:none; }
  .issue-item .tag{ color:var(--red); font-weight:700; font-size:11.5px; margin-right:6px; }
  .checkbox-row{
    display:flex; align-items:center; gap:10px; margin-top:14px; cursor:pointer; user-select:none;
  }
  .checkbox-row input[type=checkbox]{ width:18px; height:18px; accent-color: var(--amber); }
  .banner{
    background: rgba(255,197,61,0.1); border:1px solid var(--amber-dim); color: var(--amber);
    border-radius:10px; padding:10px 12px; font-size:13px; margin-bottom:14px; line-height:1.5;
  }
  .template-toggle{ display:flex; gap:8px; margin-bottom:10px; }
  .tpl-btn{
    flex:1; padding:8px 10px; border-radius:8px; border:1px solid var(--line); background:var(--panel-2);
    color:var(--text-muted); font-family:'Noto Sans Thai'; font-size:13px; font-weight:600; cursor:pointer;
  }
  .tpl-btn.active{ border-color: var(--amber); color: var(--amber); background: rgba(255,197,61,0.08); }
  @media (prefers-reduced-motion: reduce){
    .bar-fill, .job-card{ transition:none !important; animation:none !important; }
  }
</style>
</head>
<body>
<div id="app"><div style="padding:40px;text-align:center;color:#8B94A0;">กำลังโหลด...</div></div>

<script>
(function(){
  const JOBS = [
    { id:'extinguisher', name:'ตรวจถังดับเพลิง ทั่วตึก', short:'ถังดับเพลิง', unit:'ถัง', icon:'🧯',
      itemWord:'ถัง', regex:/ถัง\s*(?:ที่)?\s*([0-9]+|[ก-๙]+)/g },
    { id:'access', name:'ตรวจประตูคุมทางเข้า ทั่วตึก', short:'ประตูคุมทางเข้า', unit:'ประตู', icon:'🚪',
      itemWord:'ประตู', regex:/ประตู\s*(?:ที่)?\s*([0-9]+|[ก-๙]+)/g },
    { id:'camera', name:'ตรวจกล้อง', short:'กล้องวงจรปิด', unit:'กล้อง', icon:'📷',
      itemWord:'กล้อง', regex:/กล้อง\s*(?:ที่)?\s*([0-9]+|[ก-๙]+)/g },
    { id:'golfcart', name:'รถกอล์ฟทุกคัน', short:'รถกอล์ฟ', unit:'คัน', icon:'🚗',
      itemWord:'คัน', regex:/รถ(?:กอล์ฟ)?\s*(?:คันที่|คัน)?\s*([0-9]+|[ก-๙]+)/g },
    { id:'firedoor', name:'ประตูหนีไฟ', short:'ประตูหนีไฟ', unit:'จุด', icon:'🔥',
      itemWord:'จุด', regex:/(?:ประตูหนีไฟ|จุด)\s*(?:ที่)?\s*([0-9]+|[ก-๙]+)/g },
  ];
  const OK_WORDS = ['ปกติ','ใช้งานได้','ดี','เรียบร้อย','พร้อมใช้'];
  const BAD_WORDS = ['เสีย','ชำรุด','หมดอายุ','ผิดปกติ','ตก','ไม่ทำงาน','พัง','รั่ว','หลุด','ค้าง'];
  const THAI_MONTHS = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  const THAI_MONTHS_SHORT = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const DEFAULT_EXPECTED = { extinguisher:10, access:6, camera:12, golfcart:4, firedoor:8 };
  const DEFAULT_SCHEMA = {
    extinguisher: [
      { id:'pressure', label:'แรงดันเกจ', type:'select', options:['ปกติ (เขียว)','ต่ำ (แดง)','สูง (เหลือง)'], keyword:'แรงดัน' },
      { id:'expiry', label:'วันหมดอายุ', type:'date', keyword:'หมดอายุ' }
    ],
    access: [
      { id:'battery', label:'สถานะแบตสำรอง', type:'select', options:['ปกติ','ต่ำ'], keyword:'แบต' }
    ],
    camera: [
      { id:'recording', label:'บันทึกภาพ', type:'select', options:['ทำงาน','ไม่ทำงาน'], keyword:'บันทึก' }
    ],
    golfcart: [
      { id:'battery', label:'แบตเตอรี่ (%)', type:'number', keyword:'แบต' },
      { id:'tire', label:'สภาพยาง', type:'select', options:['ปกติ','ต้องเปลี่ยน'], keyword:'ยาง' }
    ],
    firedoor: [
      { id:'alarm', label:'สัญญาณเตือน', type:'select', options:['ทำงาน','ไม่ทำงาน'], keyword:'สัญญาณ' }
    ],
  };
  const FIELD_TYPES = [ {v:'text',l:'ข้อความ'}, {v:'number',l:'ตัวเลข'}, {v:'date',l:'วันที่'}, {v:'datetime',l:'วันที่+เวลา'}, {v:'select',l:'ตัวเลือก'} ];
  const THEME_COLORS = {
    dark:     { bg:'#12161B', panel:'#1B2129', line:'#2C3540', text:'#F1EEE6', muted:'#8B94A0', amber:'#FFC53D', green:'#46C08C', red:'#E5484D' },
    light:    { bg:'#F7F5EF', panel:'#FFFFFF', line:'#DED7C7', text:'#221F19', muted:'#6E6656', amber:'#B8790A', green:'#1F9D66', red:'#C93A3F' },
    contrast: { bg:'#000000', panel:'#111111', line:'#3A3A3A', text:'#FFFFFF', muted:'#BFBFBF', amber:'#FFD400', green:'#00E676', red:'#FF453A' },
  };
  const THEME_LABELS = { dark:'มืด', light:'สว่าง', contrast:'คอนทราสต์สูง' };
  const THEME_ORDER = ['dark','light','contrast'];

  function todayMonthKey(){
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  }
  function monthLabel(key){
    const [y,m] = key.split('-').map(Number);
    return THAI_MONTHS[m-1] + ' ' + (y+543);
  }
  function monthLabelShort(key){
    const [y,m] = key.split('-').map(Number);
    return THAI_MONTHS_SHORT[m-1] + "'" + String((y+543)).slice(-2);
  }
  function uid(){ return Math.random().toString(36).slice(2,9); }

  const STORAGE_PREFIX = 'inspection-app:';
  async function sGet(key, shared){
    try{
      const raw = localStorage.getItem(STORAGE_PREFIX + key);
      return raw ? JSON.parse(raw) : null;
    }catch(e){ return null; }
  }
  async function sSet(key, value, shared){
    try{
      localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(value));
      return true;
    }catch(e){
      console.error('storage set failed', e);
      showToast('บันทึกไม่สำเร็จ (พื้นที่จัดเก็บของเบราว์เซอร์เต็ม หรือปิดการใช้งานอยู่)');
      return false;
    }
  }

  // ---------- Parser ----------
  function extractFieldValue(tail, field){
    tail = (tail||'').trim();
    if(!tail) return '';
    if(field.type === 'select'){
      for(const opt of (field.options||[])){
        const candidates = [opt];
        const beforeParen = opt.split('(')[0].trim();
        if(beforeParen) candidates.push(beforeParen);
        const paren = opt.match(/\(([^)]+)\)/);
        if(paren) candidates.push(paren[1].trim());
        if(candidates.some(c => c && tail.includes(c))) return opt;
      }
      return '';
    }
    if(field.type === 'number'){
      const m = tail.match(/-?\d+(\.\d+)?/);
      return m ? m[0] : '';
    }
    if(field.type === 'date' || field.type === 'datetime'){
      const m = tail.match(/(\d{1,2}[\/\-\.]\d{1,2}(?:[\/\-\.]\d{2,4})?)|(?:ม\.ค\.|ก\.พ\.|มี\.ค\.|เม\.ย\.|พ\.ค\.|มิ\.ย\.|ก\.ค\.|ส\.ค\.|ก\.ย\.|ต\.ค\.|พ\.ย\.|ธ\.ค\.)\s*\d{0,4}/);
      if(!m) return '';
      let val = m[0].trim();
      if(field.type === 'datetime'){
        const tm = tail.slice(m.index + m[0].length).match(/\d{1,2}[:.]\d{2}/);
        if(tm) val += ' ' + tm[0].replace('.',':');
      }
      return val;
    }
    let t = tail.replace(/^[\s,.\-:]+/, '').trim();
    const words = t.split(/\s+/).slice(0,8);
    return words.join(' ').replace(/[,.\-:]+$/,'').trim();
  }

  function nowValueForFieldType(type){
    const d = new Date();
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const yyyy = d.getFullYear() + 543;
    let s = `${dd}/${mm}/${yyyy}`;
    if(type === 'datetime'){
      const hh = String(d.getHours()).padStart(2,'0');
      const mi = String(d.getMinutes()).padStart(2,'0');
      s += ` ${hh}:${mi}`;
    }
    return s;
  }
  function autoFillDefaults(jobId){
    const custom = {};
    (S.schema[jobId] || []).forEach(f=>{
      if(f.autoFill && (f.type==='date' || f.type==='datetime')) custom[f.id] = nowValueForFieldType(f.type);
    });
    return custom;
  }

  function extractCustomFields(segment, jobId){
    const schemaFields = (S.schema && S.schema[jobId]) || [];
    const custom = {};
    if(!schemaFields.length) return custom;
    const kwMarkers = [];
    schemaFields.forEach(f=>{
      const kw = (f.keyword || f.label || '').trim();
      if(!kw) return;
      const idx = segment.indexOf(kw);
      if(idx !== -1) kwMarkers.push({ idx, len: kw.length, field: f });
    });
    kwMarkers.sort((a,b)=>a.idx-b.idx);
    kwMarkers.forEach((km, ki)=>{
      const startTail = km.idx + km.len;
      const nextBound = ki+1 < kwMarkers.length ? kwMarkers[ki+1].idx : segment.length;
      const windowEnd = Math.min(startTail+30, nextBound, segment.length);
      const tail = segment.slice(startTail, windowEnd);
      const val = extractFieldValue(tail, km.field);
      if(val) custom[km.field.id] = val;
    });
    schemaFields.forEach(f=>{
      if(f.autoFill && (f.type==='date' || f.type==='datetime') && custom[f.id]===undefined){
        custom[f.id] = nowValueForFieldType(f.type);
      }
    });
    return custom;
  }

  function parseNotes(text, job){
    const items = [];
    if(!text || !text.trim()) return items;
    let currentFloor = '';
    const zones = S.zones[job.id] || [];
    const markers = [];
    if(zones.length){
      // Zone mode: match each configured zone name as a literal marker, longest names first
      // so e.g. "ST10" isn't shadowed by a match of "ST1" at the same position.
      const sortedZones = [...zones].sort((a,b)=> b.name.length - a.name.length);
      sortedZones.forEach(z=>{
        if(!z.name) return;
        let searchFrom = 0;
        let idx;
        while((idx = text.indexOf(z.name, searchFrom)) !== -1){
          const overlaps = markers.some(m => m.type==='floor' && idx < m.pos + m.value.length && idx + z.name.length > m.pos);
          if(!overlaps) markers.push({ pos: idx, type:'floor', value: z.name });
          searchFrom = idx + z.name.length;
        }
      });
    } else {
      const floorRe = /ชั้น\s*([A-Za-zก-๙0-9\.]+)/g;
      let fm;
      while((fm = floorRe.exec(text)) !== null){
        markers.push({ pos: fm.index, type:'floor', value: fm[1] });
      }
    }
    const itemRe = new RegExp(job.regex.source, 'g');
    let im;
    while((im = itemRe.exec(text)) !== null){
      markers.push({ pos: im.index, type:'item', value: im[1] });
    }
    markers.sort((a,b)=>a.pos-b.pos);
    for(let i=0;i<markers.length;i++){
      const mk = markers[i];
      if(mk.type === 'floor'){
        currentFloor = mk.value;
      } else {
        const nextPos = (i+1 < markers.length) ? markers[i+1].pos : text.length;
        const segment = text.slice(mk.pos, nextPos);
        let status = 'ok';
        const badHit = BAD_WORDS.find(w => segment.includes(w));
        if(badHit){ status = 'bad'; }
        let note = segment.replace(job.regex, '').trim();
        note = note.replace(/^[\s,.\-:]+/, '').trim();
        OK_WORDS.concat(BAD_WORDS).forEach(w=>{ note = note.replace(w, '').trim(); });
        items.push({ id: uid(), floor: currentFloor, label: job.itemWord + mk.value, status, note, timestamp: nowValueForFieldType('datetime'), custom: extractCustomFields(segment, job.id) });
      }
    }
    return items;
  }

  // ---------- Gauge SVG ----------
  function polar(cx,cy,r,angleDeg){
    const rad = angleDeg * Math.PI/180;
    return { x: cx + r*Math.cos(rad), y: cy - r*Math.sin(rad) };
  }
  function arcPath(cx,cy,r,angleStart,angleEnd){
    const p1 = polar(cx,cy,r,angleStart);
    const p2 = polar(cx,cy,r,angleEnd);
    return `M ${p1.x.toFixed(2)} ${p1.y.toFixed(2)} A ${r} ${r} 0 0 1 ${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`;
  }
  function gaugeSVG(pct, big){
    pct = Math.max(0, Math.min(100, pct));
    const size = big ? 132 : 76;
    const cx = size/2, cy = size*0.62, r = size*0.42, strokeW = big ? 10 : 7;
    const needleR = r - strokeW - (big? 6:4);
    const angle = 180 - pct*1.8;
    const needleP = polar(cx,cy,needleR,angle);
    const color = pct < 50 ? 'var(--red)' : pct < 80 ? 'var(--amber)' : 'var(--green)';
    return `
      <svg width="${size}" height="${size*0.68}" viewBox="0 0 ${size} ${size*0.68}">
        <path d="${arcPath(cx,cy,r,180,90)}" stroke="var(--red)" stroke-width="${strokeW}" fill="none" stroke-linecap="round" opacity="0.85"/>
        <path d="${arcPath(cx,cy,r,90,36)}" stroke="var(--amber)" stroke-width="${strokeW}" fill="none" stroke-linecap="round" opacity="0.85"/>
        <path d="${arcPath(cx,cy,r,36,0)}" stroke="var(--green)" stroke-width="${strokeW}" fill="none" stroke-linecap="round" opacity="0.85"/>
        <line x1="${cx}" y1="${cy}" x2="${needleP.x.toFixed(2)}" y2="${needleP.y.toFixed(2)}" stroke="${color}" stroke-width="${big?3:2.5}" stroke-linecap="round"/>
        <circle cx="${cx}" cy="${cy}" r="${big?5:4}" fill="${color}"/>
        <text x="${cx}" y="${cy - (big?18:12)}" text-anchor="middle" fill="var(--text)" font-family="JetBrains Mono" font-weight="700" font-size="${big?20:14}">${Math.round(pct)}%</text>
      </svg>`;
  }

    const cache = {};
    for(const job of JOBS){

  function hasZones(jobId){
    return (S.zones[jobId] || []).length > 0;

  function zoneTotalExpected(jobId){
    return (S.zones[jobId] || []).reduce((sum,z)=> sum + (parseInt(z.expected,10)||0), 0);
  }
  function jobExpected(jobId){
    return hasZones(jobId) ? zoneTotalExpected(jobId) : (S.expected[jobId] || 1);
  }
  function jobStatus(jobId){
    const data = S.jobsCache[jobId] || emptyJobData();
    const expected = jobExpected(jobId) || 1;
    const n = data.items.length;
    const pct = Math.min(100, Math.round((n/expected)*100));

  // ---------- Render: Job Detail ----------
  function fieldInputHTML(field, item){
    const val = (item.custom && item.custom[field.id] !== undefined) ? item.custom[field.id] : '';
    if(field.type === 'select'){
      const opts = (field.options||[]).map(o=>`<option value="${escapeAttr(o)}" ${o===val?'selected':''}>${escapeText(o)}</option>`).join('');

  function escapeAttr(s){
    return (s===undefined||s===null?'':String(s)).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  }
  function escapeText(s){
    return (s===undefined||s===null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;');
  }

  function headerLines(){
    let lines = [];
    if(S.reportHeader.buildingName) lines.push('อาคาร: ' + S.reportHeader.buildingName);
    if(S.reportHeader.inspectorName) lines.push('ผู้ตรวจ: ' + S.reportHeader.inspectorName);
    return lines.length ? lines.join('\n') + '\n' : '';
  }

  function buildJobSummaryText(job, monthKey, template){
    template = template || S.summaryTemplate;
    const data = S.jobsCache[job.id];
    const schema = S.schema[job.id] || [];
    const expected = jobExpected(job.id);
    const n = data.items.length;
    const pct = Math.min(100, Math.round((n/expected)*100));
    const okItems = data.items.filter(i=>i.status==='ok');
    const badItems = data.items.filter(i=>i.status==='bad');
    let text = headerLines();

    if(template === 'detailed'){
      text += `รายงานละเอียด: ${job.short}\nเดือน: ${monthLabel(monthKey)}\n`;
      text += `ตรวจแล้ว ${n}/${expected} จุด (${pct}%) — ปกติ ${okItems.length} จุด | ผิดปกติ ${badItems.length} จุด\n`;

      // group by floor
      const floors = {};
      const order = [];
      data.items.forEach(i=>{
        const key = i.floor && i.floor.trim() ? i.floor.trim() : 'ไม่ระบุชั้น';
        if(!floors[key]){ floors[key] = []; order.push(key); }
        floors[key].push(i);
      });
      order.sort((a,b)=>{
        const na = parseInt(a,10), nb = parseInt(b,10);
        if(!isNaN(na) && !isNaN(nb)) return na-nb;
        return a.localeCompare(b,'th');
      });

      if(order.length){
        text += `\nรายละเอียดตามชั้น:\n`;
        order.forEach(floorKey=>{
          text += `\n[ชั้น ${floorKey}]\n`;
          floors[floorKey].forEach(i=>{
            let line = `- ${i.label} : ${i.status==='ok'?'ปกติ':'⚠ ผิดปกติ'}`;
            if(i.timestamp) line += ` | บันทึกเมื่อ: ${i.timestamp}`;
            schema.forEach(f=>{
              const v = (i.custom && i.custom[f.id]) ? i.custom[f.id] : '';
              if(v) line += ` | ${f.label}: ${v}`;
            });
            if(i.note) line += ` | หมายเหตุ: ${i.note}`;
            text += line + '\n';
          });
        });
      } else {
        text += `\nยังไม่มีรายการที่ตรวจ\n`;
      }

      const selectFields = schema.filter(f=>f.type==='select');
      if(selectFields.length && n>0){
        text += `\nสรุปตามฟิลด์เพิ่มเติม:\n`;
        selectFields.forEach(f=>{
          const counts = {};
          data.items.forEach(i=>{
            const v = (i.custom && i.custom[f.id]) ? i.custom[f.id] : '';
            if(v) counts[v] = (counts[v]||0) + 1;
          });
          const parts = Object.keys(counts).map(k=>`${k} ${counts[k]} จุด`);
          text += `- ${f.label}: ${parts.length ? parts.join(', ') : 'ยังไม่มีข้อมูล'}\n`;
        });
      }
    } else {
      // short template: minimal, issues-only
      text += `สรุปย่อผลตรวจ: ${job.short}\nเดือน: ${monthLabel(monthKey)}\nตรวจแล้ว: ${n}/${expected} จุด (${pct}%)\n`;
      if(badItems.length){
        text += `\nจุดที่ต้องดำเนินการ (ผิดปกติ ${badItems.length} จุด):\n`;
        badItems.forEach(i=>{
          let line = `- ชั้น${i.floor||'-'} ${i.label}`;
          if(i.note) line += ` : ${i.note}`;
          text += line + '\n';
        });
      } else {
        text += `\nไม่พบจุดผิดปกติ\n`;
      }
    }
    if(n < expected){
      text += `\nหมายเหตุ: ยังตรวจไม่ครบ ขาดอีก ${expected-n} จุด จากที่ตั้งไว้ในระบบ\n`;
    }
    return text;
  }

  function renderSummaryOutput(){

    const text = buildJobSummaryText(job, S.monthKey, S.summaryTemplate);

    out.innerHTML = `<pre class="summary-text">${escapeText(text)}</pre><button class="btn-ghost btn-small" data-action="copy-job-summary">คัดลอกข้อความสรุป</button>`;
    out.dataset.text = text;
  }

  // ---------- Render: Monthly Summary ----------
  function renderSummary(){
    const completedCount = JOBS.filter(j => (S.jobsCache[j.id]||{}).completed).length;

    const hasHistory = S.monthsIndex.filter(m=>m!==S.monthKey).length > 0 || S.monthsIndex.length > 1;

    const jobRows = JOBS.map(job=>{
      const st = jobStatus(job.id);
      const badge = st.completed
        ? (st.badCount>0 ? '<span class="chip chip-bad">มีปัญหา</span>' : '<span class="chip chip-ok">เสร็จแล้ว</span>')
        : '<span class="chip chip-none">ยังไม่เสร็จ</span>';
      return `
        <div class="job-card" style="cursor:default;">
          <div>${gaugeSVG(st.pct,false)}</div>
          <div class="job-info">
            <div class="job-name">${job.short}</div>

    const allIssues = [];

      <div class="panel">
        <div class="job-name" style="margin-bottom:8px;">รายการที่มีปัญหาทั้งหมด</div>

  function downloadCSV(csvContent, filename){
    const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 2000);
  }
  function csvCell(v){
    v = (v===undefined||v===null) ? '' : String(v);
    if(/[",\n]/.test(v)) v = '"' + v.replace(/"/g,'""') + '"';
    return v;
  }
  function buildJobCSV(job){
    const data = S.jobsCache[job.id];
    const schema = S.schema[job.id] || [];
    const header = ['ชั้น','จุด','สถานะ','วันที่-เวลาที่บันทึก', ...schema.map(f=>f.label), 'หมายเหตุ'];
    const lines = [header.map(csvCell).join(',')];
    data.items.forEach(i=>{
      const row = [i.floor, i.label, i.status==='ok'?'ปกติ':'ผิดปกติ', i.timestamp||'',
        ...schema.map(f => (i.custom && i.custom[f.id]) ? i.custom[f.id] : ''),
        i.note];
      lines.push(row.map(csvCell).join(','));
    });
    return lines.join('\r\n');
  }
  function buildMonthCSV(){
    const header = ['งาน','ชั้น','จุด','สถานะ','วันที่-เวลาที่บันทึก','หมายเหตุ'];
    const lines = [header.map(csvCell).join(',')];
    JOBS.forEach(job=>{
      const data = S.jobsCache[job.id];
      data.items.forEach(i=>{
        lines.push([job.short, i.floor, i.label, i.status==='ok'?'ปกติ':'ผิดปกติ', i.timestamp||'', i.note].map(csvCell).join(','));
      });
    });
    return lines.join('\r\n');
  }

  // ---------- Canvas export helpers ----------
  async function ensureFonts(){
    try{
      await Promise.all([
        document.fonts.load("700 20px 'Noto Sans Thai'"),
        document.fonts.load("400 14px 'Noto Sans Thai'"),
        document.fonts.load("700 14px 'JetBrains Mono'"),
      ]);
      await document.fonts.ready;
    }catch(e){ /* fonts api not available, proceed anyway */ }
  }
  function downloadCanvas(canvas, filename){
    canvas.toBlob(function(blob){
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url), 2000);
    }, 'image/png');
  }
  function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }
  function pctColor(pct, C){
    return pct < 50 ? C.red : pct < 80 ? C.amber : C.green;
  }

  async function exportBarChart(){
    await ensureFonts();
    const C = THEME_COLORS[S.theme] || THEME_COLORS.dark;
    const W = 900, H = 560;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = C.bg; ctx.fillRect(0,0,W,H);

    ctx.fillStyle = C.text;
    ctx.font = "700 24px 'Noto Sans Thai'";
    ctx.fillText('สรุปกราฟความครบถ้วนของงานตรวจอาคาร', 40, 50);
    ctx.font = "400 15px 'Noto Sans Thai'";
    ctx.fillStyle = C.muted;
    let sub = monthLabel(S.monthKey);
    if(S.reportHeader.buildingName) sub += '  ·  อาคาร ' + S.reportHeader.buildingName;
    ctx.fillText(sub, 40, 78);

    const chartTop = 130, chartBottom = H - 90, chartLeft = 70, chartRight = W - 40;
    const chartH = chartBottom - chartTop;

    // gridlines
    ctx.strokeStyle = C.line; ctx.lineWidth = 1;
    ctx.font = "500 12px 'JetBrains Mono'";
    ctx.fillStyle = C.muted;
    [0,25,50,75,100].forEach(v=>{
      const y = chartBottom - (v/100)*chartH;
      ctx.beginPath(); ctx.moveTo(chartLeft, y); ctx.lineTo(chartRight, y); ctx.stroke();
      ctx.fillText(v+'%', 30, y+4);
    });

    const n = JOBS.length;
    const slotW = (chartRight - chartLeft) / n;
    const barW = slotW * 0.5;

    JOBS.forEach((job, idx)=>{
      const st = jobStatus(job.id);
      const barH = (st.pct/100) * chartH;
      const x = chartLeft + idx*slotW + (slotW-barW)/2;
      const y = chartBottom - barH;
      ctx.fillStyle = pctColor(st.pct, C);
      roundRect(ctx, x, y, barW, Math.max(barH,2), 6);
      ctx.fill();

      ctx.fillStyle = C.text;
      ctx.font = "700 15px 'JetBrains Mono'";
      ctx.textAlign = 'center';
      ctx.fillText(st.pct+'%', x + barW/2, y - 10);

      ctx.font = "500 14px 'Noto Sans Thai'";
      ctx.fillStyle = C.muted;
      ctx.fillText(job.short, x + barW/2, chartBottom + 26);
      ctx.font = "400 12px 'JetBrains Mono'";
      ctx.fillText(st.n+'/'+st.expected, x + barW/2, chartBottom + 44);
      ctx.textAlign = 'left';
    });

    downloadCanvas(canvas, `สรุปกราฟ-${S.monthKey}.png`);
    showToast('ส่งออกกราฟแล้ว');
  }

  async function computeMonthOverallPct(monthKey){
    let completed = 0;
    for(const job of JOBS){
      const d = await sGet(`month:${monthKey}:job:${job.id}`);
      if(d && d.completed) completed++;
    }
    return Math.round((completed/JOBS.length)*100);
  }

  async function exportTrendChart(){
    await ensureFonts();
    const C = THEME_COLORS[S.theme] || THEME_COLORS.dark;
    const months = Array.from(new Set([S.monthKey, ...S.monthsIndex])).sort().slice(-6);
    const points = [];
    for(const m of months){
      const pct = await computeMonthOverallPct(m);
      points.push({ monthKey: m, pct });
    }

    const W = 900, H = 520;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = C.bg; ctx.fillRect(0,0,W,H);

    ctx.fillStyle = C.text;
    ctx.font = "700 24px 'Noto Sans Thai'";
    ctx.fillText('แนวโน้มความครบถ้วนของงานตรวจอาคาร', 40, 50);
    ctx.font = "400 15px 'Noto Sans Thai'";
    ctx.fillStyle = C.muted;
    let sub = 'ภาพรวมงานที่เสร็จสมบูรณ์ต่อเดือน (5 งาน)';
    if(S.reportHeader.buildingName) sub += '  ·  อาคาร ' + S.reportHeader.buildingName;
    ctx.fillText(sub, 40, 78);

    const chartTop = 120, chartBottom = H - 90, chartLeft = 70, chartRight = W - 60;
    const chartH = chartBottom - chartTop;

    ctx.strokeStyle = C.line; ctx.lineWidth = 1;
    ctx.font = "500 12px 'JetBrains Mono'";
    ctx.fillStyle = C.muted;
    [0,25,50,75,100].forEach(v=>{
      const y = chartBottom - (v/100)*chartH;
      ctx.beginPath(); ctx.moveTo(chartLeft, y); ctx.lineTo(chartRight, y); ctx.stroke();
      ctx.fillText(v+'%', 30, y+4);
    });

    const n = points.length;
    const stepX = n > 1 ? (chartRight - chartLeft) / (n-1) : 0;
    const coords = points.map((p,idx)=>({
      x: n>1 ? chartLeft + idx*stepX : (chartLeft+chartRight)/2,
      y: chartBottom - (p.pct/100)*chartH,
      pct: p.pct, monthKey: p.monthKey
    }));

    ctx.strokeStyle = C.amber; ctx.lineWidth = 3; ctx.lineJoin='round';
    ctx.beginPath();
    coords.forEach((c,idx)=>{ if(idx===0) ctx.moveTo(c.x,c.y); else ctx.lineTo(c.x,c.y); });
    ctx.stroke();

    coords.forEach(c=>{
      ctx.fillStyle = pctColor(c.pct, C);
      ctx.beginPath(); ctx.arc(c.x,c.y,6,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = C.text;
      ctx.font = "700 14px 'JetBrains Mono'";
      ctx.textAlign='center';
      ctx.fillText(c.pct+'%', c.x, c.y-14);
      ctx.font = "500 13px 'Noto Sans Thai'";
      ctx.fillStyle = C.muted;
      ctx.fillText(monthLabelShort(c.monthKey), c.x, chartBottom+28);
      ctx.textAlign='left';
    });

    downloadCanvas(canvas, `แนวโน้ม-${S.monthKey}.png`);
    showToast('ส่งออกกราฟแนวโน้มแล้ว');
  }

        render();

    if(e.target.matches('[data-field]')){
      const job = JOBS.find(j=>j.id===S.currentJobId);
      const item = S.jobsCache[job.id].items.find(i=>i.id===e.target.dataset.item);
      if(item){
        item[e.target.dataset.field] = e.target.value;

      return;
    }
  });

  // ---------- Init ----------
  async function init(){
    const cfg = await sGet('config:expected');
    if(cfg) S.expected = {...DEFAULT_EXPECTED, ...cfg};
    const schema = await sGet('config:schema');
    if(schema) S.schema = schema;
    const zones = await sGet('config:zones');
    if(zones) S.zones = zones;
    const header = await sGet('config:reportHeader');
    if(header) S.reportHeader = header;
    const idx = await sGet('months:index');
    S.monthsIndex = idx || [];
    const theme = await sGet('config:theme');
    if(theme && THEME_ORDER.includes(theme)) S.theme = theme;
    applyTheme();
    await loadMonthData(S.monthKey);
    render();
  }
  init();
})();
</script>
</body>
