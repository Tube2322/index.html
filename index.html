  async function sGet(key, shared){
    try{
      const user = fbAuth.currentUser;
      if(!user) return null;
      const snap = await fbDb.collection('users').doc(user.uid).collection('data').doc(key).get();
      return snap.exists ? JSON.parse(snap.data().value) : null;
    }catch(e){ console.error('read failed', e); return null; }
  }
  async function sSet(key, value, shared){
    try{
      const user = fbAuth.currentUser;
      if(!user) return false;
      await fbDb.collection('users').doc(user.uid).collection('data').doc(key).set({ value: JSON.stringify(value) });
      return true;
    }catch(e){
      console.error('storage set failed', e);
      showToast('บันทึกไม่สำเร็จ (เช็คอินเทอร์เน็ต แล้วลองแก้รายการนี้อีกครั้ง)');
      return false;
    }
  }

  // ---------- Parser ----------
  function extractFieldValue(tail, field){
    tail = (tail||'').trim();
    if(!tail) return '';
    if(field.type === 'select'){
      for(const opt of (field.options||[])){
        const candidates = [opt];
        const beforeParen = opt.split('(')[0].trim();
        if(beforeParen) candidates.push(beforeParen);
        const paren = opt.match(/\(([^)]+)\)/);
        if(paren) candidates.push(paren[1].trim());
        if(candidates.some(c => c && tail.includes(c))) return opt;
      }
      return '';
    }
    if(field.type === 'number'){
      const m = tail.match(/-?\d+(\.\d+)?/);
      return m ? m[0] : '';
    }
    if(field.type === 'date' || field.type === 'datetime'){
      const m = tail.match(/(\d{1,2}[\/\-\.]\d{1,2}(?:[\/\-\.]\d{2,4})?)|(?:ม\.ค\.|ก\.พ\.|มี\.ค\.|เม\.ย\.|พ\.ค\.|มิ\.ย\.|ก\.ค\.|ส\.ค\.|ก\.ย\.|ต\.ค\.|พ\.ย\.|ธ\.ค\.)\s*\d{0,4}/);
      if(!m) return '';
      let val = m[0].trim();
      if(field.type === 'datetime'){
        const tm = tail.slice(m.index + m[0].length).match(/\d{1,2}[:.]\d{2}/);
        if(tm) val += ' ' + tm[0].replace('.',':');
      }
      return val;
    }
    let t = tail.replace(/^[\s,.\-:]+/, '').trim();
    const words = t.split(/\s+/).slice(0,8);
    return words.join(' ').replace(/[,.\-:]+$/,'').trim();
  }

  function nowValueForFieldType(type){
    const d = new Date();
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const yyyy = d.getFullYear() + 543;
    let s = `${dd}/${mm}/${yyyy}`;
    if(type === 'datetime'){
      const hh = String(d.getHours()).padStart(2,'0');
      const mi = String(d.getMinutes()).padStart(2,'0');
      s += ` ${hh}:${mi}`;
    }
    return s;
  }
  function autoFillDefaults(jobId){
    const custom = {};
    (S.schema[jobId] || []).forEach(f=>{
      if(f.autoFill && (f.type==='date' || f.type==='datetime')) custom[f.id] = nowValueForFieldType(f.type);
    });
    return custom;
  }

  function extractCustomFields(segment, jobId){
    const schemaFields = (S.schema && S.schema[jobId]) || [];
    const custom = {};
    if(!schemaFields.length) return custom;
    const kwMarkers = [];
    schemaFields.forEach(f=>{
      const kw = (f.keyword || f.label || '').trim();
      if(!kw) return;
      const idx = segment.indexOf(kw);
      if(idx !== -1) kwMarkers.push({ idx, len: kw.length, field: f });
    });
    kwMarkers.sort((a,b)=>a.idx-b.idx);
    kwMarkers.forEach((km, ki)=>{
      const startTail = km.idx + km.len;
      const nextBound = ki+1 < kwMarkers.length ? kwMarkers[ki+1].idx : segment.length;
      const windowEnd = Math.min(startTail+30, nextBound, segment.length);
      const tail = segment.slice(startTail, windowEnd);
      const val = extractFieldValue(tail, km.field);
      if(val) custom[km.field.id] = val;
    });
    schemaFields.forEach(f=>{
      if(f.autoFill && (f.type==='date' || f.type==='datetime') && custom[f.id]===undefined){
        custom[f.id] = nowValueForFieldType(f.type);
      }
    });
    return custom;
  }

  function parseNotes(text, job){
    const items = [];
    if(!text || !text.trim()) return items;
    let currentFloor = '';
    const zones = S.zones[job.id] || [];
    const markers = [];
    if(zones.length){
      // Zone mode: match each configured zone name as a literal marker, longest names first
      // so e.g. "ST10" isn't shadowed by a match of "ST1" at the same position.
      const sortedZones = [...zones].sort((a,b)=> b.name.length - a.name.length);
      sortedZones.forEach(z=>{
        if(!z.name) return;
        let searchFrom = 0;
        let idx;
        while((idx = text.indexOf(z.name, searchFrom)) !== -1){
          const overlaps = markers.some(m => m.type==='floor' && idx < m.pos + m.value.length && idx + z.name.length > m.pos);
          if(!overlaps) markers.push({ pos: idx, type:'floor', value: z.name });
          searchFrom = idx + z.name.length;
        }
      });
    } else {
      const floorRe = /ชั้น\s*([A-Za-zก-๙0-9\.]+)/g;
      let fm;
      while((fm = floorRe.exec(text)) !== null){
        markers.push({ pos: fm.index, type:'floor', value: fm[1] });
      }
    }
    const itemRe = new RegExp(job.regex.source, 'g');
    let im;
    while((im = itemRe.exec(text)) !== null){
      markers.push({ pos: im.index, type:'item', value: im[1] });
    }
    markers.sort((a,b)=>a.pos-b.pos);
    for(let i=0;i<markers.length;i++){
      const mk = markers[i];
      if(mk.type === 'floor'){
        currentFloor = mk.value;
      } else {
        const nextPos = (i+1 < markers.length) ? markers[i+1].pos : text.length;
        const segment = text.slice(mk.pos, nextPos);
        let status = 'ok';
        const badHit = BAD_WORDS.find(w => segment.includes(w));
        if(badHit){ status = 'bad'; }
        let note = segment.replace(job.regex, '').trim();
        note = note.replace(/^[\s,.\-:]+/, '').trim();
        OK_WORDS.concat(BAD_WORDS).forEach(w=>{ note = note.replace(w, '').trim(); });
        items.push({ id: uid(), floor: currentFloor, label: job.itemWord + mk.value, status, note, timestamp: nowValueForFieldType('datetime'), photoLink: '', custom: extractCustomFields(segment, job.id) });
      }
    }
    return items;
  }

  // ---------- Gauge SVG ----------
  function polar(cx,cy,r,angleDeg){
    const rad = angleDeg * Math.PI/180;
    return { x: cx + r*Math.cos(rad), y: cy - r*Math.sin(rad) };
  }
  function arcPath(cx,cy,r,angleStart,angleEnd){
    const p1 = polar(cx,cy,r,angleStart);
    const p2 = polar(cx,cy,r,angleEnd);
    return `M ${p1.x.toFixed(2)} ${p1.y.toFixed(2)} A ${r} ${r} 0 0 1 ${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`;
  }
  function gaugeSVG(pct, big){
    pct = Math.max(0, Math.min(100, pct));
    const size = big ? 132 : 76;
    const cx = size/2, cy = size*0.62, r = size*0.42, strokeW = big ? 10 : 7;
    const needleR = r - strokeW - (big? 6:4);
    const angle = 180 - pct*1.8;
    const needleP = polar(cx,cy,needleR,angle);
    const color = pct < 50 ? 'var(--red)' : pct < 80 ? 'var(--amber)' : 'var(--green)';
    return `
      <svg width="${size}" height="${size*0.68}" viewBox="0 0 ${size} ${size*0.68}">
        <path d="${arcPath(cx,cy,r,180,90)}" stroke="var(--red)" stroke-width="${strokeW}" fill="none" stroke-linecap="round" opacity="0.85"/>
        <path d="${arcPath(cx,cy,r,90,36)}" stroke="var(--amber)" stroke-width="${strokeW}" fill="none" stroke-linecap="round" opacity="0.85"/>
        <path d="${arcPath(cx,cy,r,36,0)}" stroke="var(--green)" stroke-width="${strokeW}" fill="none" stroke-linecap="round" opacity="0.85"/>
        <line x1="${cx}" y1="${cy}" x2="${needleP.x.toFixed(2)}" y2="${needleP.y.toFixed(2)}" stroke="${color}" stroke-width="${big?3:2.5}" stroke-linecap="round"/>
        <circle cx="${cx}" cy="${cy}" r="${big?5:4}" fill="${color}"/>
        <text x="${cx}" y="${cy - (big?18:12)}" text-anchor="middle" fill="var(--text)" font-family="JetBrains Mono" font-weight="700" font-size="${big?20:14}">${Math.round(pct)}%</text>
      </svg>`;
  }

  function applyTheme(){
    if(S.theme === 'dark'){ document.documentElement.removeAttribute('data-theme'); }
    else { document.documentElement.setAttribute('data-theme', S.theme); }
  }

  function emptyJobData(){
    return { items: [], rawHistory: [], completed: false, completedAt: null };
  }

  async function loadMonthData(monthKey){
    const cache = {};
    for(const job of JOBS){
      const d = await sGet(`month:${monthKey}:job:${job.id}`);
      cache[job.id] = d || emptyJobData();
    }
    S.jobsCache = cache;
  }

  async function saveJobData(monthKey, jobId){
    await sSet(`month:${monthKey}:job:${jobId}`, S.jobsCache[jobId]);
    if(!S.monthsIndex.includes(monthKey)){
      S.monthsIndex.push(monthKey);
      S.monthsIndex.sort().reverse();
      await sSet('months:index', S.monthsIndex);
    }
  }

  function hasZones(jobId){
    return (S.zones[jobId] || []).length > 0;
  }
  function zoneTotalExpected(jobId){
    return (S.zones[jobId] || []).reduce((sum,z)=> sum + (parseInt(z.expected,10)||0), 0);
  }
  function jobExpected(jobId){
    return hasZones(jobId) ? zoneTotalExpected(jobId) : (S.expected[jobId] || 1);
  }
  function jobStatus(jobId){
    const data = S.jobsCache[jobId] || emptyJobData();
    const expected = jobExpected(jobId) || 1;
    const n = data.items.length;
    const pct = Math.min(100, Math.round((n/expected)*100));
    const badCount = data.items.filter(i=>i.status==='bad').length;
    return { n, expected, pct, badCount, completed: data.completed };
  }

            ${rows || `<tr><td colspan="${7+schema.length}"><div class="empty-row">ยังไม่มีรายการ — พิมพ์โน้ตด้านบนแล้วกด "แยกข้อมูล" หรือเพิ่มรายการเอง</div></td></tr>`}

          ${n>0 ? `<button class="btn-ghost btn-small" data-action="mark-all-ok" data-job="${job.id}">ทำเครื่องหมายปกติทั้งหมด</button>` : ''}

        <div class="completeness-bar">
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:${barColor};"></div></div>
          <div class="mono" style="font-size:13px; white-space:nowrap;">${n}/${expected} (${pct}%)</div>
        </div>
        ${badCount>0 ? `<div class="hint" style="color:var(--red);">พบผิดปกติ ${badCount} จุด</div>` : ''}
        ${usesZones ? `
          <div class="divider"></div>
          <div class="fcaption" style="margin-bottom:6px; font-weight:600;">ความครบถ้วนแยกตามโซน</div>

            const zn = data.items.filter(i=>i.floor===z.name).length;
            const zExp = parseInt(z.expected,10) || 1;
            const zPct = Math.min(100, Math.round((zn/zExp)*100));
            const zColor = zPct < 50 ? 'var(--red)' : zPct < 80 ? 'var(--amber)' : 'var(--green)';

              <div class="bar-track" style="height:6px;"><div class="bar-fill" style="width:${zPct}%; background:${zColor}; height:6px;"></div></div>
              <div class="mono" style="font-size:11.5px; width:56px; text-align:right; flex-shrink:0;">${zn}/${zExp}</div>

          <button class="tpl-btn ${S.summaryTemplate==='detailed'?'active':''}" data-action="set-template" data-template="detailed">สรุปละเอียด</button>
        </div>
        <button class="btn" data-action="generate-summary">สร้างสรุปสำหรับกรอกฟอร์มจริง</button>

      <div class="panel">
        <label class="checkbox-row">
          <input type="checkbox" ${data.completed?'checked':''} data-action="toggle-complete">

        </label>
      </div>
    `;
  }

  function escapeAttr(s){
    return (s===undefined||s===null?'':String(s)).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  }
  function escapeText(s){
    return (s===undefined||s===null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;');
  }

  function headerLines(){
    let lines = [];
    if(S.reportHeader.buildingName) lines.push('อาคาร: ' + S.reportHeader.buildingName);
    if(S.reportHeader.inspectorName) lines.push('ผู้ตรวจ: ' + S.reportHeader.inspectorName);
    return lines.length ? lines.join('\n') + '\n' : '';
  }

  function buildJobSummaryText(job, monthKey, template){
    template = template || S.summaryTemplate;
    const data = S.jobsCache[job.id];
    const schema = S.schema[job.id] || [];
    const expected = jobExpected(job.id);
    const n = data.items.length;
    const pct = Math.min(100, Math.round((n/expected)*100));
    const okItems = data.items.filter(i=>i.status==='ok');
    const badItems = data.items.filter(i=>i.status==='bad');
    let text = headerLines();

    if(template === 'detailed'){
      text += `รายงานละเอียด: ${job.short}\nเดือน: ${monthLabel(monthKey)}\n`;
      text += `ตรวจแล้ว ${n}/${expected} จุด (${pct}%) — ปกติ ${okItems.length} จุด | ผิดปกติ ${badItems.length} จุด\n`;

      // group by floor
      const floors = {};
      const order = [];
      data.items.forEach(i=>{
        const key = i.floor && i.floor.trim() ? i.floor.trim() : 'ไม่ระบุชั้น';
        if(!floors[key]){ floors[key] = []; order.push(key); }
        floors[key].push(i);
      });
      order.sort((a,b)=>{
        const na = parseInt(a,10), nb = parseInt(b,10);
        if(!isNaN(na) && !isNaN(nb)) return na-nb;
        return a.localeCompare(b,'th');
      });

      if(order.length){
        text += `\nรายละเอียดตามชั้น:\n`;
        order.forEach(floorKey=>{
          text += `\n[ชั้น ${floorKey}]\n`;
          floors[floorKey].forEach(i=>{
            let line = `- ${i.label} : ${i.status==='ok'?'ปกติ':'⚠ ผิดปกติ'}`;
            if(i.timestamp) line += ` | บันทึกเมื่อ: ${i.timestamp}`;
            if(i.photoLink) line += ` | รูปภาพ: ${i.photoLink}`;
            schema.forEach(f=>{
              const v = (i.custom && i.custom[f.id]) ? i.custom[f.id] : '';
              if(v) line += ` | ${f.label}: ${v}`;
            });
            if(i.note) line += ` | หมายเหตุ: ${i.note}`;
            text += line + '\n';
          });
        });
      } else {
        text += `\nยังไม่มีรายการที่ตรวจ\n`;
      }

      const selectFields = schema.filter(f=>f.type==='select');
      if(selectFields.length && n>0){
        text += `\nสรุปตามฟิลด์เพิ่มเติม:\n`;
        selectFields.forEach(f=>{
          const counts = {};
          data.items.forEach(i=>{
            const v = (i.custom && i.custom[f.id]) ? i.custom[f.id] : '';
            if(v) counts[v] = (counts[v]||0) + 1;
          });
          const parts = Object.keys(counts).map(k=>`${k} ${counts[k]} จุด`);
          text += `- ${f.label}: ${parts.length ? parts.join(', ') : 'ยังไม่มีข้อมูล'}\n`;
        });
      }
    } else {
      // short template: minimal, issues-only
      text += `สรุปย่อผลตรวจ: ${job.short}\nเดือน: ${monthLabel(monthKey)}\nตรวจแล้ว: ${n}/${expected} จุด (${pct}%)\n`;
      if(badItems.length){
        text += `\nจุดที่ต้องดำเนินการ (ผิดปกติ ${badItems.length} จุด):\n`;
        badItems.forEach(i=>{
          let line = `- ชั้น${i.floor||'-'} ${i.label}`;
          if(i.note) line += ` : ${i.note}`;
          text += line + '\n';
        });
      } else {
        text += `\nไม่พบจุดผิดปกติ\n`;
      }
    }
    if(n < expected){
      text += `\nหมายเหตุ: ยังตรวจไม่ครบ ขาดอีก ${expected-n} จุด จากที่ตั้งไว้ในระบบ\n`;
    }
    return text;
  }

  function renderSummaryOutput(){
    const job = JOBS.find(j=>j.id===S.currentJobId);
    if(!job) return;
    const text = buildJobSummaryText(job, S.monthKey, S.summaryTemplate);
    const out = document.getElementById('summaryOutput');
    if(!out) return;
    out.innerHTML = `<pre class="summary-text">${escapeText(text)}</pre><button class="btn-ghost btn-small" data-action="copy-job-summary">คัดลอกข้อความสรุป</button>`;
    out.dataset.text = text;
  }

    const completedCount = JOBS.filter(j => (S.jobsCache[j.id]||{}).completed).length;

      const st = jobStatus(job.id);
      const badge = st.completed
        ? (st.badCount>0 ? '<span class="chip chip-bad">มีปัญหา</span>' : '<span class="chip chip-ok">เสร็จแล้ว</span>')
        : '<span class="chip chip-none">ยังไม่เสร็จ</span>';
      return `
        <div class="job-card" style="cursor:default;">
          <div>${gaugeSVG(st.pct,false)}</div>
          <div class="job-info">
            <div class="job-name">${job.short}</div>
            <div class="job-sub">${st.n}/${st.expected} ${job.unit}${st.badCount>0 ? ' · ผิดปกติ '+st.badCount : ''}</div>

    const allIssues = [];

    return `
      <div class="back-row">
        <button class="iconbtn" data-action="go-home" aria-label="กลับ">←</button>
        <h2>สรุปประจำเดือน · ${monthLabel(S.monthKey)}</h2>
      </div>
      <div class="panel overall-panel">
        <div>${gaugeSVG(overallPct,true)}</div>
        <div class="overall-text">
          <div class="big-num mono">${completedCount}/5</div>
          <div class="label">งานเสร็จแล้วในเดือนนี้</div>
        </div>
      </div>
      <div class="job-grid">${jobRows}</div>
      <div class="panel">
        <div class="job-name" style="margin-bottom:8px;">รายการที่มีปัญหาทั้งหมด</div>
        ${allIssues.length ? allIssues.join('') : '<div class="hint" style="margin:0;">ยังไม่พบรายการผิดปกติ</div>'}
      </div>
      <div class="panel">
        <div class="job-name" style="margin-bottom:10px;">ส่งออกรายงาน</div>
        <button class="btn" data-action="export-pdf-report" style="margin-bottom:10px;">📄 สร้างรายงาน PDF (สรุป+กราฟ+รายละเอียด)</button>
        <div class="btn-row">
          <button class="btn-ghost" data-action="copy-month-summary">คัดลอกสรุปทั้งเดือน (ข้อความ)</button>
          <button class="btn-ghost" data-action="export-month-csv">ส่งออก CSV ทั้งเดือน (Excel)</button>
          <button class="btn-ghost" data-action="export-bar-chart">ส่งออกกราฟเดือนนี้ (PNG)</button>
          ${hasHistory ? '<button class="btn-ghost" data-action="export-trend-chart">ส่งออกกราฟแนวโน้ม (PNG)</button>' : ''}
        </div>
        ${!hasHistory ? '<div class="hint">กราฟแนวโน้มจะใช้ได้เมื่อมีข้อมูลมากกว่า 1 เดือน</div>' : ''}
      </div>
    `;
  }

  function buildMonthSummaryText(){
    let text = headerLines() + `สรุปงานตรวจอาคารประจำเดือน ${monthLabel(S.monthKey)}\n\n`;
    JOBS.forEach(job=>{
      text += buildJobSummaryText(job, S.monthKey, S.summaryTemplate).replace(headerLines(),'') + '\n';
    });
    return text.trim();
  }

          <input type="number" min="1" value="${z.expected}" data-zone-edit-expected="${job.id}::${z.id}" style="width:70px; background:var(--panel-2); border:1px solid var(--line); color:var(--text); border-radius:6px; padding:6px 8px; font-family:'JetBrains Mono'; font-size:13px; text-align:center;">

  function downloadCSV(csvContent, filename){
    const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 2000);
  }
  function csvCell(v){
    v = (v===undefined||v===null) ? '' : String(v);
    if(/[",\n]/.test(v)) v = '"' + v.replace(/"/g,'""') + '"';
    return v;
  }
  function buildJobCSV(job){
    const data = S.jobsCache[job.id];
    const schema = S.schema[job.id] || [];
    const header = ['ชั้น','จุด','สถานะ','วันที่-เวลาที่บันทึก','ลิงก์รูปภาพ', ...schema.map(f=>f.label), 'หมายเหตุ'];
    const lines = [header.map(csvCell).join(',')];
    data.items.forEach(i=>{
      const row = [i.floor, i.label, i.status==='ok'?'ปกติ':'ผิดปกติ', i.timestamp||'', i.photoLink||'',
        ...schema.map(f => (i.custom && i.custom[f.id]) ? i.custom[f.id] : ''),
        i.note];
      lines.push(row.map(csvCell).join(','));
    });
    return lines.join('\r\n');
  }
  function buildMonthCSV(){
    const header = ['งาน','ชั้น','จุด','สถานะ','วันที่-เวลาที่บันทึก','ลิงก์รูปภาพ','หมายเหตุ'];
    const lines = [header.map(csvCell).join(',')];
    JOBS.forEach(job=>{
      const data = S.jobsCache[job.id];
      data.items.forEach(i=>{
        lines.push([job.short, i.floor, i.label, i.status==='ok'?'ปกติ':'ผิดปกติ', i.timestamp||'', i.photoLink||'', i.note].map(csvCell).join(','));
      });
    });
    return lines.join('\r\n');
  }

  // ---------- Canvas export helpers ----------
  async function ensureFonts(){
    try{
      await Promise.all([
        document.fonts.load("700 20px 'Noto Sans Thai'"),
        document.fonts.load("400 14px 'Noto Sans Thai'"),
        document.fonts.load("700 14px 'JetBrains Mono'"),
      ]);
      await document.fonts.ready;
    }catch(e){ /* fonts api not available, proceed anyway */ }
  }
  function downloadCanvas(canvas, filename){
    canvas.toBlob(function(blob){
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url), 2000);
    }, 'image/png');
  }
  function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }
  function pctColor(pct, C){
    return pct < 50 ? C.red : pct < 80 ? C.amber : C.green;
  }

  function buildBarChartCanvas(){
    const C = THEME_COLORS[S.theme] || THEME_COLORS.dark;
    const W = 900, H = 560;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = C.bg; ctx.fillRect(0,0,W,H);

    ctx.fillStyle = C.text;
    ctx.font = "700 24px 'Noto Sans Thai'";
    ctx.fillText('สรุปกราฟความครบถ้วนของงานตรวจอาคาร', 40, 50);
    ctx.font = "400 15px 'Noto Sans Thai'";
    ctx.fillStyle = C.muted;
    let sub = monthLabel(S.monthKey);
    if(S.reportHeader.buildingName) sub += '  ·  อาคาร ' + S.reportHeader.buildingName;
    ctx.fillText(sub, 40, 78);

    const chartTop = 130, chartBottom = H - 90, chartLeft = 70, chartRight = W - 40;
    const chartH = chartBottom - chartTop;

    // gridlines
    ctx.strokeStyle = C.line; ctx.lineWidth = 1;
    ctx.font = "500 12px 'JetBrains Mono'";
    ctx.fillStyle = C.muted;
    [0,25,50,75,100].forEach(v=>{
      const y = chartBottom - (v/100)*chartH;
      ctx.beginPath(); ctx.moveTo(chartLeft, y); ctx.lineTo(chartRight, y); ctx.stroke();
      ctx.fillText(v+'%', 30, y+4);
    });

    const n = JOBS.length;
    const slotW = (chartRight - chartLeft) / n;
    const barW = slotW * 0.5;

    JOBS.forEach((job, idx)=>{
      const st = jobStatus(job.id);
      const barH = (st.pct/100) * chartH;
      const x = chartLeft + idx*slotW + (slotW-barW)/2;
      const y = chartBottom - barH;
      ctx.fillStyle = pctColor(st.pct, C);
      roundRect(ctx, x, y, barW, Math.max(barH,2), 6);
      ctx.fill();

      ctx.fillStyle = C.text;
      ctx.font = "700 15px 'JetBrains Mono'";
      ctx.textAlign = 'center';
      ctx.fillText(st.pct+'%', x + barW/2, y - 10);

      ctx.font = "500 14px 'Noto Sans Thai'";
      ctx.fillStyle = C.muted;
      ctx.fillText(job.short, x + barW/2, chartBottom + 26);
      ctx.font = "400 12px 'JetBrains Mono'";
      ctx.fillText(st.n+'/'+st.expected, x + barW/2, chartBottom + 44);
      ctx.textAlign = 'left';
    });

    return canvas;
  }

  async function exportBarChart(){
    await ensureFonts();
    const canvas = buildBarChartCanvas();
    downloadCanvas(canvas, `สรุปกราฟ-${S.monthKey}.png`);
    showToast('ส่งออกกราฟแล้ว');
  }

  async function computeMonthOverallPct(monthKey){
    let completed = 0;
    for(const job of JOBS){
      const d = await sGet(`month:${monthKey}:job:${job.id}`);
      if(d && d.completed) completed++;
    }
    return Math.round((completed/JOBS.length)*100);
  }

  async function buildTrendChartCanvas(){
    const C = THEME_COLORS[S.theme] || THEME_COLORS.dark;
    const months = Array.from(new Set([S.monthKey, ...S.monthsIndex])).sort().slice(-6);
    const points = [];
    for(const m of months){
      const pct = await computeMonthOverallPct(m);
      points.push({ monthKey: m, pct });
    }

    const W = 900, H = 520;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = C.bg; ctx.fillRect(0,0,W,H);

    ctx.fillStyle = C.text;
    ctx.font = "700 24px 'Noto Sans Thai'";
    ctx.fillText('แนวโน้มความครบถ้วนของงานตรวจอาคาร', 40, 50);
    ctx.font = "400 15px 'Noto Sans Thai'";
    ctx.fillStyle = C.muted;
    let sub = 'ภาพรวมงานที่เสร็จสมบูรณ์ต่อเดือน (5 งาน)';
    if(S.reportHeader.buildingName) sub += '  ·  อาคาร ' + S.reportHeader.buildingName;
    ctx.fillText(sub, 40, 78);

    const chartTop = 120, chartBottom = H - 90, chartLeft = 70, chartRight = W - 60;
    const chartH = chartBottom - chartTop;

    ctx.strokeStyle = C.line; ctx.lineWidth = 1;
    ctx.font = "500 12px 'JetBrains Mono'";
    ctx.fillStyle = C.muted;
    [0,25,50,75,100].forEach(v=>{
      const y = chartBottom - (v/100)*chartH;
      ctx.beginPath(); ctx.moveTo(chartLeft, y); ctx.lineTo(chartRight, y); ctx.stroke();
      ctx.fillText(v+'%', 30, y+4);
    });

    const n = points.length;
    const stepX = n > 1 ? (chartRight - chartLeft) / (n-1) : 0;
    const coords = points.map((p,idx)=>({
      x: n>1 ? chartLeft + idx*stepX : (chartLeft+chartRight)/2,
      y: chartBottom - (p.pct/100)*chartH,
      pct: p.pct, monthKey: p.monthKey
    }));

    ctx.strokeStyle = C.amber; ctx.lineWidth = 3; ctx.lineJoin='round';
    ctx.beginPath();
    coords.forEach((c,idx)=>{ if(idx===0) ctx.moveTo(c.x,c.y); else ctx.lineTo(c.x,c.y); });
    ctx.stroke();

    coords.forEach(c=>{
      ctx.fillStyle = pctColor(c.pct, C);
      ctx.beginPath(); ctx.arc(c.x,c.y,6,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = C.text;
      ctx.font = "700 14px 'JetBrains Mono'";
      ctx.textAlign='center';
      ctx.fillText(c.pct+'%', c.x, c.y-14);
      ctx.font = "500 13px 'Noto Sans Thai'";
      ctx.fillStyle = C.muted;
      ctx.fillText(monthLabelShort(c.monthKey), c.x, chartBottom+28);
      ctx.textAlign='left';
    });

    return canvas;
  }

  async function exportTrendChart(){
    await ensureFonts();

    // summary table of all 5 jobs
    let ty = 560;
    ctx.font = "700 18px 'Noto Sans Thai'";

    ctx.fillText('สรุปแยกตามงาน', 50, ty);
    ty += 20;
    ctx.strokeStyle = C.line; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(50, ty); ctx.lineTo(W-50, ty); ctx.stroke();
    ty += 36;

    const colX = { name:50, count:400, pct:520, issues:640, status:770 };

    ctx.fillText('ตรวจแล้ว', colX.count, ty);
    ctx.fillText('% ครบถ้วน', colX.pct, ty);
    ctx.fillText('ผิดปกติ', colX.issues, ty);
    ctx.fillText('สถานะ', colX.status, ty);
    ty += 14;
    ctx.beginPath(); ctx.moveTo(50, ty); ctx.lineTo(W-50, ty); ctx.stroke();
    ty += 32;

    JOBS.forEach(job=>{
      const st = jobStatus(job.id);
      ctx.font = "500 15px 'Noto Sans Thai'"; ctx.fillStyle = C.text;

      ctx.fillText(`${st.n}/${st.expected}`, colX.count, ty);
      ctx.fillStyle = pctColor(st.pct, C);
      ctx.font = "700 14px 'JetBrains Mono'";
      ctx.fillText(`${st.pct}%`, colX.pct, ty);

        ctx.fillStyle = C.muted;
        ctx.fillText('ยังไม่เสร็จ', colX.status, ty);
      }

    });

    ctx.font = "400 12px 'Noto Sans Thai'";
    ctx.fillStyle = C.muted;
    ctx.fillText('สร้างโดยระบบตรวจอาคารประจำเดือน', 50, H-30);

    return canvas;
  }

  function drawGaugeOnCanvas(ctx, cx, cy, r, pct, C){
    pct = Math.max(0, Math.min(100, pct));
    const strokeW = r*0.18;
    ctx.lineCap = 'round';
    ctx.strokeStyle = C.red; ctx.lineWidth = strokeW;
    ctx.beginPath(); ctx.arc(cx, cy, r, Math.PI, Math.PI*1.4); ctx.stroke();
    ctx.strokeStyle = C.amber;
    ctx.beginPath(); ctx.arc(cx, cy, r, Math.PI*1.4, Math.PI*1.8); ctx.stroke();
    ctx.strokeStyle = C.green;
    ctx.beginPath(); ctx.arc(cx, cy, r, Math.PI*1.8, Math.PI*2); ctx.stroke();

    const needleAngle = Math.PI + (pct/100)*Math.PI;
    const needleR = r - strokeW - 10;
    const nx = cx + needleR*Math.cos(needleAngle);
    const ny = cy + needleR*Math.sin(needleAngle);
    const color = pct < 50 ? C.red : pct < 80 ? C.amber : C.green;
    ctx.strokeStyle = color; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(nx, ny); ctx.stroke();
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(cx, cy, 8, 0, Math.PI*2); ctx.fill();

    ctx.textAlign = 'center';
    ctx.fillStyle = C.text;
    ctx.font = `700 ${Math.round(r*0.28)}px 'JetBrains Mono'`;
    ctx.fillText(pct + '%', cx, cy - r*0.35);
    ctx.textAlign = 'left';
  }

  function buildJobDetailCanvas(job){
    const C = THEME_COLORS[S.theme] || THEME_COLORS.dark;
    const data = S.jobsCache[job.id];
    const schema = S.schema[job.id] || [];
    const st = jobStatus(job.id);
    const rowH = 30;
    const headerH = 150;
    const footerH = 40;
    const W = 900;
    const H = Math.max(400, headerH + footerH + Math.max(1, data.items.length) * rowH + 40);
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = C.bg; ctx.fillRect(0,0,W,H);

    ctx.fillStyle = C.text;
    ctx.font = "700 22px 'Noto Sans Thai'";
    ctx.fillText(job.icon + ' ' + job.short, 40, 46);
    ctx.font = "400 14px 'Noto Sans Thai'";
    ctx.fillStyle = C.muted;
    ctx.fillText(`${monthLabel(S.monthKey)} · ตรวจแล้ว ${st.n}/${st.expected} จุด (${st.pct}%) · ผิดปกติ ${st.badCount} จุด`, 40, 70);

    let y = headerH;
    const colX = { floor:40, label:120, status:230, extra:330, note:620 };
    ctx.font = "600 12px 'Noto Sans Thai'"; ctx.fillStyle = C.muted;
    ctx.fillText('ชั้น/โซน', colX.floor, y);
    ctx.fillText('จุด', colX.label, y);
    ctx.fillText('สถานะ', colX.status, y);
    if(schema.length) ctx.fillText(schema.map(f=>f.label).join(' / '), colX.extra, y);
    ctx.fillText('หมายเหตุ', colX.note, y);
    y += 10;
    ctx.strokeStyle = C.line; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(40, y); ctx.lineTo(W-40, y); ctx.stroke();
    y += 26;

    if(data.items.length === 0){
      ctx.font = "400 14px 'Noto Sans Thai'"; ctx.fillStyle = C.muted;
      ctx.fillText('ยังไม่มีข้อมูลการตรวจ', colX.floor, y);
    }

    data.items.forEach(item=>{
      ctx.font = "400 13.5px 'Noto Sans Thai'"; ctx.fillStyle = C.text;
      ctx.fillText(item.floor || '-', colX.floor, y);
      ctx.fillText(item.label, colX.label, y);
      ctx.fillStyle = item.status === 'ok' ? C.green : C.red;
      ctx.font = "700 13px 'Noto Sans Thai'";
      ctx.fillText(item.status === 'ok' ? 'ปกติ' : '⚠ ผิดปกติ', colX.status, y);
      if(schema.length){
        ctx.font = "400 13px 'Noto Sans Thai'"; ctx.fillStyle = C.muted;
        const vals = schema.map(f => (item.custom && item.custom[f.id]) ? item.custom[f.id] : '-').join(' / ');
        ctx.fillText(vals.length > 45 ? vals.slice(0,45)+'…' : vals, colX.extra, y);
      }
      ctx.font = "400 13px 'Noto Sans Thai'"; ctx.fillStyle = C.muted;
      let noteText = item.note || '';
      if(item.photoLink) noteText += (noteText ? ' · ' : '') + '📷 มีรูป';
      if(noteText.length > 40) noteText = noteText.slice(0,40) + '…';
      ctx.fillText(noteText, colX.note, y);
      y += rowH;
    });

    ctx.font = "400 11px 'JetBrains Mono'"; ctx.fillStyle = C.muted;
    ctx.fillText(monthLabel(S.monthKey) + ' — ' + job.short, 40, H-16);

    return canvas;
  }

  async function generatePDFReport(){
    if(!window.jspdf){ showToast('โหลดไลบรารี PDF ไม่สำเร็จ เช็คอินเทอร์เน็ตแล้วลองใหม่'); return; }
    await ensureFonts();
    showToast('กำลังสร้างรายงาน PDF...');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation:'portrait', unit:'pt', format:'a4' });
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();

    function addCanvasPage(canvas, isFirst){
      if(!isFirst) pdf.addPage();
      const imgData = canvas.toDataURL('image/png');
      const ratio = canvas.width / canvas.height;
      let w = pageW - 40, h = w / ratio;
      if(h > pageH - 40){ h = pageH - 40; w = h * ratio; }
      const x = (pageW - w) / 2, y = 20;
      pdf.addImage(imgData, 'PNG', x, y, w, h);
    }

    addCanvasPage(buildCoverCanvas(), true);
    addCanvasPage(buildBarChartCanvas(), false);
    const hasHistory = S.monthsIndex.filter(m=>m!==S.monthKey).length > 0 || S.monthsIndex.length > 1;
    if(hasHistory) addCanvasPage(await buildTrendChartCanvas(), false);
    JOBS.forEach(job=>{
      addCanvasPage(buildJobDetailCanvas(job), false);
    });

    pdf.save(`รายงานตรวจอาคาร-${S.monthKey}.pdf`);
    showToast('สร้างรายงาน PDF แล้ว');
  }

      return;
    }
    if(e.target.matches('[data-zone-edit-name]') || e.target.matches('[data-zone-edit-expected]')){
      const key = e.target.dataset.zoneEditName || e.target.dataset.zoneEditExpected;
      const [jobId, zoneId] = key.split('::');
      const zone = (S.zones[jobId]||[]).find(z=>z.id===zoneId);
      if(zone){
        if(e.target.matches('[data-zone-edit-name]')){
          const v = e.target.value.trim();
          if(!v){ showToast('ชื่อโซนห้ามว่าง'); render(); return; }
          zone.name = v;
        } else {
          const v = parseInt(e.target.value,10);
          zone.expected = (v && v>0) ? v : 1;
        }
        await sSet('config:zones', S.zones);
        render();
      }
      return;
    }
    if(e.target.matches('[data-field]')){
      const job = JOBS.find(j=>j.id===S.currentJobId);
      const item = S.jobsCache[job.id].items.find(i=>i.id===e.target.dataset.item);
      if(item){
        item[e.target.dataset.field] = e.target.value;
        await saveJobData(S.monthKey, job.id);
      }
      return;
    }
    if(e.target.matches('[data-customfield]')){
      const job = JOBS.find(j=>j.id===S.currentJobId);
      const item = S.jobsCache[job.id].items.find(i=>i.id===e.target.dataset.item);
      if(item){
        if(!item.custom) item.custom = {};
        item.custom[e.target.dataset.customfield] = e.target.value;
        await saveJobData(S.monthKey, job.id);
      }
      return;
    }
  });

  // ---------- Init ----------
  async function init(){
    const cfg = await sGet('config:expected');
    if(cfg) S.expected = {...DEFAULT_EXPECTED, ...cfg};
    const schema = await sGet('config:schema');
    if(schema) S.schema = schema;
    const zones = await sGet('config:zones');
    if(zones) S.zones = zones;
    const header = await sGet('config:reportHeader');
    if(header) S.reportHeader = header;
    const idx = await sGet('months:index');
    S.monthsIndex = idx || [];
    const theme = await sGet('config:theme');
    if(theme && THEME_ORDER.includes(theme)) S.theme = theme;
    applyTheme();
    await loadMonthData(S.monthKey);
    S.view = 'home';
    render();
  }

  function resetAppStateForSignOut(){
    S.expected = {...DEFAULT_EXPECTED};
    S.schema = JSON.parse(JSON.stringify(DEFAULT_SCHEMA));
    S.zones = {};
    S.reportHeader = { buildingName:'', inspectorName:'' };
    S.jobsCache = {};
    S.monthsIndex = [];
    S.monthKey = todayMonthKey();
    S.currentJobId = null;
    S.summaryGenerated = false;
  }

  fbAuth.onAuthStateChanged(async (user) => {
    if(user){
      S.firebaseUser = user;
      S.authBusy = false;
      await init();
    } else {
      resetAppStateForSignOut();
      S.firebaseUser = null;
      S.view = 'login';
      render();
    }
  });
})();
</script>
</body>
